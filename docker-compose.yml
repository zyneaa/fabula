services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: fabula
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fabula"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/fabula
      - JWT_SECRET=change-me-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=60
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEFAULT_LLM_MODEL=google/gemma-4-26b-a4b-it
      - UPLOAD_DIR=./uploads
      - MAX_UPLOAD_SIZE_MB=50
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173","http://localhost"]
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
