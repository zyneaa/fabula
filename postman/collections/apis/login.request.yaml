$kind: http-request
name: login
url: http://localhost:8000/auth/login
method: POST
body:
  type: json
  content: |-
    {
        "email": "{{EMAIL}}",
        "password": "{{PASSWORD}}"
    }
scripts:
  - type: afterResponse
    code: |
      // Parse the incoming JSON response payload
      const responseData = pm.response.json();

      // Securely capture the access_token string from the response object
      const accessToken = responseData.access_token;

      // Extract token_type dynamically (capitalizes 'bearer' to 'Bearer' for headers)
      const tokenType = responseData.token_type ? responseData.token_type.charAt(0).toUpperCase() + responseData.token_type.slice(1) : "Bearer";

      // Set the collection or environment variable to automatically authorize Episode 2 endpoints
      pm.environment.set("ACCESS_TOKEN", accessToken);

      // Optional: Set a unified authorization header variable to make request setups cleaner
      pm.environment.set("AUTH_HEADER", `${tokenType} ${accessToken}`);
    language: text/javascript
order: 4129612759280593
